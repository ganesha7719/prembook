<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - prembook</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #4a90e2, #6a11cb);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p {
            margin-bottom: 25px;
            color: #777;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 5px rgba(106,17,203,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #4a90e2, #6a11cb);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .extra-links {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra-links a {
            color: #6a11cb;
            text-decoration: none;
            margin: 0 5px;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .logo {
            font-size: 26px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">💕 PremBook</div>
    <h2>Create Account</h2>
    <p>Join our love community</p>
    
    <form action="/signup" method="POST">
        <div class="input-group">
            <label>Your Name</label>
            <input type="text" name="nm" placeholder="Enter your name" required>
        </div>
        
        <div class="input-group">
            <label>User ID</label>
            <input type="text" name="uid" placeholder="Enter user ID" required>
        </div>
        
        <div class="input-group">
            <label>PIN</label>
            <input type="password" name="upin" placeholder="Enter PIN" required>
        </div>
        
        <button type="submit" class="btn">Sign Up</button>
    </form>
    
    <div class="extra-links">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
